# ═══════════════════════════════════════════════════════════════
# .github/workflows/snake.yml
# Auto-generates the contribution snake SVG every 12 hours
# Place this file at: .github/workflows/snake.yml
# ═══════════════════════════════════════════════════════════════

name: 🐍 Generate Contribution Snake

on:
  # Run automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Allow manual trigger from Actions tab
  workflow_dispatch:

  # Also run on every push to main (keeps snake fresh)
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Generate both light and dark SVG snake animations
      - name: 🐍 Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Push the generated SVGs to the "output" branch
      - name: 🚀 Push snake SVGs to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
