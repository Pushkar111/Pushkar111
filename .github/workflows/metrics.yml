# ═══════════════════════════════════════════════════════════════
# .github/workflows/metrics.yml
# Generates the isometric 3D contribution calendar SVG daily
# Requires: METRICS_TOKEN secret (classic PAT with read:user + repo)
# ═══════════════════════════════════════════════════════════════

name: 🗓️ Generate Isometric 3D Calendar

on:
  # Run every day at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Allow manual trigger from Actions tab
  workflow_dispatch:

  # Also regenerate on every push to main
  push:
    branches:
      - main

jobs:
  github-metrics:
    name: Generate Metrics SVG
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      # Full-year isometric 3D contribution calendar
      - name: 🗓️ Generate isometric calendar (full year)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.isocalendar.fullyear.svg
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata

      # Most used languages (used in README "Most Used Languages" section)
      - name: 💻 Generate languages card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          config_timezone: Asia/Kolkata

      # Featured repositories (used in README "Featured Projects" section)
      - name: 🚀 Generate featured repositories card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.repositories.svg
          base: ""
          plugin_repositories: yes
          plugin_repositories_featured: Pushkar111/GateGaurd-IITGN-Databases-CS432, Pushkar111/JavaScript-ZeroToHero, Pushkar111/event-management-api, Pushkar111/ip-address-tracker
          plugin_repositories_order: featured
          config_timezone: Asia/Kolkata

      # GitHub achievements/trophies (used in README "GitHub Trophies" section)
      - name: 🏆 Generate achievements card
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          config_timezone: Asia/Kolkata
          
